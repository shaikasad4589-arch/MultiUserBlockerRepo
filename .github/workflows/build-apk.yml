name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Extract and inspect ZIP
      run: |
        echo "📦 Extracting MultiUserBlocker.zip..."
        unzip -o MultiUserBlocker.zip
        
        echo "📂 Contents after extraction:"
        find . -type f -name "*.gradle" -o -name "*.kt" -o -name "*.java" | head -20
        
        # Find the actual project structure
        if [ -d "MultiUserBlocker" ]; then
          echo "Found MultiUserBlocker folder"
          cp -r MultiUserBlocker/* .
          rm -rf MultiUserBlocker
        fi

    - name: Create complete Gradle wrapper
      run: |
        echo "Setting up Gradle wrapper..."
        
        # Install gradle locally
        curl -s "https://services.gradle.org/distributions/gradle-8.1.0-bin.zip" -o gradle-bin.zip
        unzip -q gradle-bin.zip
        
        # Create wrapper directories
        mkdir -p gradle/wrapper
        
        # Copy wrapper jar from installed gradle
        cp gradle-8.1.0/lib/gradle-wrapper.jar gradle/wrapper/
        
        # Create wrapper properties
        cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
        distributionBase=GRADLE_USER_HOME
        distributionPath=wrapper/dists
        distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.0-bin.zip
        zipStoreBase=GRADLE_USER_HOME
        zipStorePath=wrapper/dists
        EOF
        
        # Use the installed gradle to create the wrapper script
        gradle-8.1.0/bin/gradle wrapper --gradle-version 8.1.0 || true
        
        chmod +x gradlew
        rm -rf gradle-bin.zip gradle-8.1.0
        
        echo "✅ Gradle wrapper ready"

    - name: Verify build configuration
      run: |
        echo "Checking project files..."
        [ -f build.gradle ] && echo "✅ build.gradle exists" || echo "❌ build.gradle missing"
        [ -f settings.gradle ] && echo "✅ settings.gradle exists" || echo "❌ settings.gradle missing"
        [ -d app ] && echo "✅ app directory exists" || echo "❌ app directory missing"
        [ -f app/build.gradle ] && echo "✅ app/build.gradle exists" || echo "❌ app/build.gradle missing"
        [ -f app/src/main/AndroidManifest.xml ] && echo "✅ AndroidManifest.xml exists" || echo "❌ AndroidManifest.xml missing"

    - name: Run gradle tasks
      run: |
        echo "Available tasks:"
        ./gradlew tasks --all 2>&1 | head -50

    - name: Build Debug APK
      run: |
        echo "Building Debug APK..."
        ./gradlew assembleDebug 2>&1 | tail -100

    - name: Build Release APK
      run: |
        echo "Building Release APK..."
        ./gradlew assembleRelease 2>&1 | tail -100

    - name: Find all APKs
      if: always()
      run: |
        echo "🔍 Searching for APK files..."
        find . -type f -name "*.apk" -exec ls -lh {} \;
        
        echo "Build output structure:"
        find . -type d -name "outputs" -exec find {} -type f \;

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-builds
        path: |
          **/outputs/apk/**/*.apk
        if-no-files-found: warn

    - name: Final Summary
      run: |
        echo "Build Summary:"
        echo "=============="
        if [ -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "✅ Debug APK: app/build/outputs/apk/debug/app-debug.apk"
        else
          echo "⚠️ Debug APK not found"
        fi
        
        if [ -f "app/build/outputs/apk/release/app-release.apk" ]; then
          echo "✅ Release APK: app/build/outputs/apk/release/app-release.apk"
        else
          echo "⚠️ Release APK not found"
        fi
