name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Extract zip file
      run: |
        if [ -f "MultiUserBlocker.zip" ]; then
          echo "📦 Extracting MultiUserBlocker.zip..."
          unzip -o MultiUserBlocker.zip
          echo "✅ Extraction complete"
        else
          echo "ℹ️ No zip file found, using existing source"
        fi

    - name: Determine project directory
      run: |
        if [ -d "MultiUserBlocker" ] && [ -f "MultiUserBlocker/build.gradle" ]; then
          echo "PROJECT_DIR=MultiUserBlocker" >> $GITHUB_ENV
          echo "✅ Project found in MultiUserBlocker/"
        elif [ -f "build.gradle" ]; then
          echo "PROJECT_DIR=." >> $GITHUB_ENV
          echo "✅ Project found in root"
        else
          echo "❌ No build.gradle found!"
          find . -name "build.gradle" -type f 2>/dev/null || echo "No build.gradle files"
          exit 1
        fi

    - name: Generate gradle wrapper
      run: |
        cd "$PROJECT_DIR"
        
        if [ ! -f "gradlew" ]; then
          echo "⚠️ Generating gradle wrapper..."
          gradle wrapper --gradle-version 8.1.0 --distribution-type bin || {
            echo "❌ Gradle wrapper generation failed"
            exit 1
          }
        fi
        
        chmod +x gradlew
        echo "✅ Gradle wrapper ready"

    - name: Build Release APK
      run: |
        cd "$PROJECT_DIR"
        echo "🏗️ Building Release APK..."
        ./gradlew assembleRelease

    - name: Build Debug APK
      run: |
        cd "$PROJECT_DIR"
        echo "🐛 Building Debug APK..."
        ./gradlew assembleDebug

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-builds
        path: |
          MultiUserBlocker/app/build/outputs/apk/release/*.apk
          MultiUserBlocker/app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Build Complete
      if: success()
      run: |
        echo "✅ BUILD SUCCESSFUL!"
        echo "📱 APKs generated:"
        find . -name "*.apk" -type f
