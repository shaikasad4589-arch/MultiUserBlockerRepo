name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Extract and organize project
      run: |
        echo "📦 Extracting MultiUserBlocker.zip..."
        if [ -f "MultiUserBlocker.zip" ]; then
          unzip -o MultiUserBlocker.zip
          
          # Move contents to root if in subdirectory
          if [ -d "MultiUserBlocker/app" ] && [ -f "MultiUserBlocker/build.gradle" ]; then
            echo "✅ Found MultiUserBlocker subdirectory"
            cp -r MultiUserBlocker/* .
            rm -rf MultiUserBlocker/
            echo "✅ Project moved to root"
          fi
        fi
        
        echo "📂 Project structure:"
        ls -la

    - name: Verify project structure
      run: |
        if [ ! -f "build.gradle" ]; then
          echo "❌ build.gradle not found!"
          exit 1
        fi
        
        if [ ! -d "app" ]; then
          echo "❌ app directory not found!"
          exit 1
        fi
        
        echo "✅ Project structure verified"

    - name: Generate gradle wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "🔧 Generating gradle wrapper..."
          gradle wrapper --gradle-version 8.1.0 --distribution-type bin
        fi
        
        chmod +x gradlew
        echo "✅ Gradle wrapper ready"
        ./gradlew --version

    - name: Clean build
      run: |
        echo "🧹 Cleaning previous builds..."
        ./gradlew clean

    - name: Build Release APK
      run: |
        echo "🏗️ Building Release APK..."
        ./gradlew assembleRelease -x lint

    - name: Build Debug APK
      run: |
        echo "🐛 Building Debug APK..."
        ./gradlew assembleDebug -x lint

    - name: Verify APKs were created
      run: |
        echo "🔍 Checking for APK files..."
        find . -name "*.apk" -type f -ls
        
        if [ ! -f "app/build/outputs/apk/release/app-release.apk" ]; then
          echo "⚠️ Release APK not found"
        fi
        
        if [ ! -f "app/build/outputs/apk/debug/app-debug.apk" ]; then
          echo "⚠️ Debug APK not found"
        fi

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-builds
        path: app/build/outputs/apk/
        if-no-files-found: warn
        retention-days: 30

    - name: Build Summary
      if: success()
      run: |
        echo "✅ BUILD COMPLETED SUCCESSFULLY!"
        echo "📱 APKs are ready for download in the Artifacts section"
