name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Extract zip file
      run: |
        if [ -f "MultiUserBlocker.zip" ]; then
          echo "Extracting MultiUserBlocker.zip"
          unzip -o MultiUserBlocker.zip
        fi

    - name: Determine project directory
      run: |
        if [ -d "MultiUserBlocker" ] && [ -f "MultiUserBlocker/build.gradle" ]; then
          echo "PROJECT_DIR=MultiUserBlocker" >> $GITHUB_ENV
        elif [ -f "build.gradle" ]; then
          echo "PROJECT_DIR=." >> $GITHUB_ENV
        else
          echo "ERROR: No build.gradle found!"
          exit 1
        fi

    - name: Generate gradlew if missing
      run: |
        cd "$PROJECT_DIR"
        if [ ! -f "gradlew" ]; then
          echo "gradlew not found, generating with gradle wrapper"
          gradle wrapper --gradle-version 8.1
        fi
        chmod +x gradlew
        ls -la gradlew

    - name: Build Release APK
      run: |
        cd "$PROJECT_DIR"
        ./gradlew assembleRelease

    - name: Build Debug APK
      run: |
        cd "$PROJECT_DIR"
        ./gradlew assembleDebug

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: apk-builds
        path: |
          MultiUserBlocker/app/build/outputs/apk/release/*.apk
          MultiUserBlocker/app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
          app/build/outputs/apk/debug/*.apk

    - name: Build Summary
      run: |
        echo "✅ Build completed successfully!"
        find . -name "*.apk" -type f
