name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v2

    - name: Extract zip file if it exists
      run: |
        if [ -f "MultiUserBlocker.zip" ]; then
          unzip -o MultiUserBlocker.zip
          echo "✓ Zip extracted"
        fi

    - name: Make gradlew executable
      run: |
        if [ -f "MultiUserBlocker/gradlew" ]; then
          chmod +x MultiUserBlocker/gradlew
        elif [ -f "gradlew" ]; then
          chmod +x gradlew
        fi

    - name: Build Release APK
      run: |
        if [ -d "MultiUserBlocker" ]; then
          cd MultiUserBlocker && ./gradlew assembleRelease
        else
          ./gradlew assembleRelease
        fi

    - name: Build Debug APK
      run: |
        if [ -d "MultiUserBlocker" ]; then
          cd MultiUserBlocker && ./gradlew assembleDebug
        else
          ./gradlew assembleDebug
        fi

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: apk-build
        path: |
          app/build/outputs/apk/release/app-release.apk
          MultiUserBlocker/app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/debug/app-debug.apk
          MultiUserBlocker/app/build/outputs/apk/debug/app-debug.apk
