name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Extract project
      run: |
        echo "📦 Extracting MultiUserBlocker.zip..."
        unzip -o MultiUserBlocker.zip
        
        # Show what was extracted
        echo "📂 Extracted contents:"
        ls -la
        
        # If MultiUserBlocker folder exists, copy contents to root
        if [ -d "MultiUserBlocker" ]; then
          echo "Moving MultiUserBlocker contents to root..."
          cp -r MultiUserBlocker/* .
          ls -la
        fi

    - name: Verify project
      run: |
        echo "✅ Verifying project structure..."
        ls -la build.gradle || echo "❌ build.gradle missing"
        ls -la settings.gradle || echo "❌ settings.gradle missing"
        ls -la -d app || echo "❌ app directory missing"
        pwd
        find . -name "build.gradle" -type f

    - name: Create gradle wrapper
      run: |
        echo "🔧 Creating gradle wrapper..."
        gradle wrapper --gradle-version 8.1.0
        chmod +x gradlew
        ls -la gradlew
        ./gradlew --version

    - name: Build Release APK (verbose)
      run: |
        echo "🏗️ Building Release APK with verbose output..."
        ./gradlew assembleRelease --info 2>&1 | tee build.log
        
        echo "📋 Build log saved"
        
        # Check if build succeeded
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "✅ Release build successful"
          find . -name "app-release.apk" -type f
        else
          echo "❌ Release build failed - showing errors:"
          cat build.log | grep -i error || cat build.log | tail -50
          exit 1
        fi

    - name: Build Debug APK (verbose)
      run: |
        echo "🐛 Building Debug APK with verbose output..."
        ./gradlew assembleDebug --info 2>&1 | tee build-debug.log
        
        # Check if build succeeded
        if [ ${PIPESTATUS[0]} -eq 0 ]; then
          echo "✅ Debug build successful"
          find . -name "app-debug.apk" -type f
        else
          echo "❌ Debug build failed - showing errors:"
          cat build-debug.log | grep -i error || cat build-debug.log | tail -50
          exit 1
        fi

    - name: Find APK files
      if: always()
      run: |
        echo "🔍 Searching for all APK files..."
        find . -name "*.apk" -type f -exec echo "Found: {}" \;
        
        echo "📂 Build output directories:"
        find . -type d -name "outputs" -exec echo "{}" \;

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: apk-builds
        path: |
          app/build/outputs/apk/release/app-release.apk
          app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload build logs on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-logs
        path: |
          build.log
          build-debug.log
