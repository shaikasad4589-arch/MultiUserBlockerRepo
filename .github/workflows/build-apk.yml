name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Set up Java 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Extract and setup project
      run: |
        echo "📦 Extracting MultiUserBlocker.zip..."
        unzip -o MultiUserBlocker.zip || true
        
        # Move project to root if nested
        if [ -d "MultiUserBlocker" ]; then
          echo "Moving project contents to root..."
          cp -r MultiUserBlocker/* . 2>/dev/null || true
          rm -rf MultiUserBlocker
        fi
        
        echo "✅ Project setup complete"

    - name: Setup Gradle Wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "Creating gradle wrapper..."
          gradle wrapper --gradle-version 8.1.0
        fi
        chmod +x gradlew
        echo "✅ Gradle wrapper ready"

    - name: Build Debug APK
      run: ./gradlew assembleDebug -q

    - name: Build Release APK
      run: ./gradlew assembleRelease -q

    - name: List built APKs
      if: always()
      run: |
        echo "🔍 Checking for APK files..."
        find . -name "*.apk" -type f 2>/dev/null | head -20

    - name: Upload artifacts
      uses: actions/upload-artifact@v5
      if: always()
      with:
        name: apk-builds
        path: |
          **/build/outputs/apk/debug/app-debug.apk
          **/build/outputs/apk/release/app-release.apk
        if-no-files-found: warn

    - name: Job Summary
      if: success()
      run: echo "✅ Build completed! Check Artifacts tab for APKs"
