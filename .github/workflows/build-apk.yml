name: Build APK

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Android SDK
      uses: android-actions/setup-android@v3

    - name: Extract project zip
      run: |
        echo "📦 Extracting MultiUserBlocker.zip..."
        if [ -f "MultiUserBlocker.zip" ]; then
          unzip -o MultiUserBlocker.zip
          echo "✅ Extraction complete"
        fi
        
        # Show structure
        echo "📂 Directory structure:"
        find . -maxdepth 3 -type f -name "build.gradle*" -o -name "settings.gradle*" | sort

    - name: Copy project to root if nested
      run: |
        if [ -d "MultiUserBlocker" ] && [ -f "MultiUserBlocker/build.gradle" ]; then
          echo "Moving project from MultiUserBlocker/ to root..."
          cp -r MultiUserBlocker/* .
          rm -rf MultiUserBlocker/
          echo "✅ Project moved to root"
        fi
        
        echo "📂 Final structure:"
        ls -la

    - name: Create missing gradle wrapper
      run: |
        if [ ! -f "gradlew" ]; then
          echo "🔧 Creating gradle wrapper files..."
          
          # Create gradle directory structure
          mkdir -p gradle/wrapper
          
          # Download gradle wrapper jar
          GRADLE_VERSION="8.1.0"
          GRADLE_URL="https://services.gradle.org/distributions/gradle-${GRADLE_VERSION}-bin.zip"
          
          echo "Downloading Gradle ${GRADLE_VERSION}..."
          curl -L "$GRADLE_URL" -o gradle-bin.zip
          
          # Extract and setup
          unzip -o gradle-bin.zip
          cp gradle-${GRADLE_VERSION}/lib/gradle-wrapper.jar gradle/wrapper/
          
          # Create wrapper properties file
          cat > gradle/wrapper/gradle-wrapper.properties << EOF
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.1.0-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Create wrapper scripts
          cat > gradlew << 'GRADLEW_EOF'
          #!/bin/sh
          APP_NAME="Gradle"
          APP_HOME=$(cd "$(dirname "$0")" && pwd)
          JAVA_OPTS="-Xmx64m -Xms64m"
          exec java $JAVA_OPTS -classpath "$APP_HOME/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
          GRADLEW_EOF
          
          chmod +x gradlew
          echo "✅ Gradle wrapper created"
        fi
        
        # Verify
        echo "Verifying gradlew..."
        ls -la gradlew
        ./gradlew --version

    - name: Build APKs
      run: |
        echo "🏗️ Building APKs..."
        
        # Build both variants
        ./gradlew clean assembleDebug assembleRelease --stacktrace 2>&1 | tail -100
        
        echo "✅ Build complete"

    - name: Find APKs
      if: always()
      run: |
        echo "🔍 Searching for APK files..."
        find . -name "*.apk" -type f -ls
        
        # Store paths for next step
        find . -name "*.apk" -type f > /tmp/apk_files.txt
        cat /tmp/apk_files.txt

    - name: Upload APKs
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: apk-builds
        path: |
          **/build/outputs/apk/**/*.apk
        if-no-files-found: warn
        retention-days: 30

    - name: Summary
      if: always()
      run: |
        echo "✅ Workflow complete!"
        echo "Check the Artifacts section to download APKs"
